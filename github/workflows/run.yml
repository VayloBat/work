name: CVE Radar
on:
  schedule:
    - cron: '*/15 * * * *' # سيعمل تلقائياً كل 15 دقيقة
  workflow_dispatch: # لتشغيله يدوياً وقتما تشاء

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install feedparser requests
      - name: Run Script
        run: python script.py
